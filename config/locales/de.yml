      workflow_title: "Chat-Sicherung: Workflow"
      workflow_intro_html: "Aus jedem KI-Chat (Claude, ChatGPT, Gemini, …) lassen sich Stand und Ergebnisse als Markdown-Notiz ins Wissensteil von miolimOS übernehmen. Beim Fortsetzen wird die Notiz nicht überschrieben, sondern um einen weiteren <code>## Session</code>-Block ergänzt."
      step1_title: "Schritt 1 — Prompt im Chat einfügen"
      step1_intro: "Klick öffnet die Zwischenablage:"
