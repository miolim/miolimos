    import:
      workflow_title: "Chat backup: workflow"
      workflow_intro_html: "From any AI chat (Claude, ChatGPT, Gemini, …) you can save the state and results as a Markdown note into the knowledge area of miolimOS. When continuing, the note is not overwritten but extended by another <code>## Session</code> block."
      step1_title: "Step 1 — Insert prompt into the chat"
      step1_intro: "Clicking opens the clipboard:"
      copy_prompt_toast: "Chat import prompt copied."
      copy_prompt_button: "Copy prompt"
      copy_prompt_also_appears: "Also appears at the top in"
      prompt_default_hint: "(Default — adjustable in the editor below.)"
      prompt_custom_prefix: "custom version —"
      reset_to_default: "reset to default"
      prompt_reset_confirm: "Discard your own prompt template?"
      adjust_prompt: "Adjust prompt"
      empty_input_resets: "With empty input the default is used again."
      step2_title: "Step 2 — Place file into the inbox"
      step2_intro: "Place the Markdown file generated by the chat (or clipboard content) into the following directory:"
      step2_path_hint_html: "Created automatically on the first import run if it does not yet exist. Path configurable via <code>MIOLIMOS_INBOX_PATH</code>; default is <code>$MIOLIMOS_DATA_PATH/inbox</code> (sub-directory of your data repo, with its own <code>.gitignore</code> — so inbox files are not accidentally committed). Land on hansserver via cloud sync (Nextcloud / rsync / …)."
      step3_title: "Step 3 — Trigger the importer"
      step3_intro: "Directly from the interface:"
      process_inbox_now: "Process inbox now"
      process_inbox_hint_html: "Processes all <code>*.md</code> files in <code>%{path}</code> synchronously and shows the result. Idempotent: created/appended files are deleted, errors remain."
      or_via_cron: "Or as a cron job on the command line:"
      cron_hint: "Recommended for automatic sync: via systemd path watcher or cron every few minutes."
      match_hierarchy_title: "Match hierarchy"
      match_hierarchy_intro: 'The importer decides "create new" vs. "append" based on this order:'
      match_rule_append_to_html: "<code>append_to: &lt;uuid&gt;</code> in the frontmatter (exact)"
      match_rule_source_url_html: "<code>source_url:</code> matches an existing item (unique chat link)"
      match_rule_chat_title_html: "<code>chat_title:</code> matches (case-insens.) — the original chat title, fixed at the provider"
      match_rule_title_html: "<code>title:</code> matches (case-insens.) — fallback, less reliable (may have been edited)"
      match_rule_no_match: "no match → a new note is created"
      chat_title_vs_title_html: "<strong><code>chat_title</code> vs. <code>title</code>:</strong> <code>chat_title</code> is the external chat title (from Claude/ChatGPT/…) and serves as a stable match key between continuations. <code>title</code> is the title within miolimOS — typically identical on first creation, but you can rename it freely later without future append calls failing. On collisions the most recently updated note wins. Frontmatter topics/tags are merged on append (union), never overwritten."
      light_header_title: "Light header (alternative input form)"
      light_header_intro: "If you do not want to write YAML, you can simply phrase the first lines as a key-value list — the importer recognizes that:"
      recognized_keys_html: "Recognized keys (case-insens., de+en): <code>Chat-Titel/Chat-Title</code>, <code>Titel/Title</code>, <code>Datum/Date</code>, <code>Quelle/URL/Source</code>, <code>Themen/Topics</code>, <code>Tags</code>, <code>Append-To</code>. Date formats: <code>YYYY-MM-DD</code> or <code>DD.MM.YYYY</code>."
      http_api_title: "HTTP API (convenience path)"
      http_api_intro: "Instead of a file drop, the chat can also append directly via HTTP — e.g. via browser bookmarklet or MCP tool. Endpoint:"
      api_content_placeholder: "complete MD OR light header OR plain body"
      http_api_token_hint_html: "Same match hierarchy as the file-drop importer. You get an API token via"
      settings_agents_link: "Settings → Agents"
      http_api_token_hint_suffix: '(create your own "chat_inbox" agent, copy the token, scope: KnowledgeItem create/update).'
      research_template_title: "Research template (🔍 at entity links)"
      research_template_intro_html: "When you start a research from the 🔍 behind a missing person/entity wikilink, this creates a job for the Researcher. This template is the job text. Placeholders: <code class=\"text-xs\">&#123;&#123;title&#125;&#125;</code> (entity), <code class=\"text-xs\">&#123;&#123;url&#125;&#125;</code> (primary source), <code class=\"text-xs\">&#123;&#123;source&#125;&#125;</code> (source KI title). The system appends the mechanical closing lines (job ID/PATCH/done)."
