      prompt_reset_confirm: "Eigenes Prompt-Template verwerfen?"
      adjust_prompt: "Prompt anpassen"
      empty_input_resets: "Bei leerer Eingabe wird wieder der Default verwendet."
      step2_title: "Schritt 2 — Datei in die Inbox legen"
      step2_intro: "Die vom Chat erzeugte Markdown-Datei (oder Zwischenablage-Inhalt) in folgendes Verzeichnis ablegen:"
      step2_path_hint_html: "Wird automatisch beim ersten Import-Run angelegt, falls noch nicht vorhanden. Pfad konfigurierbar via <code>MIOLIMOS_INBOX_PATH</code>; Default ist <code>$MIOLIMOS_DATA_PATH/inbox</code> (sub-Verzeichnis Deines Daten-Repos, mit eigener <code>.gitignore</code> — Inbox-Dateien werden also nicht versehentlich committed). Per Cloud-Sync (Nextcloud / rsync / …) auf hansserver landen."
      step3_title: "Schritt 3 — Importer auslösen"
      step3_intro: "Direkt aus dem Interface:"
      process_inbox_now: "Inbox jetzt verarbeiten"
      process_inbox_hint_html: "Verarbeitet alle <code>*.md</code>-Dateien in <code>%{path}</code> synchron und zeigt das Ergebnis an. Idempotent: angelegte/angehängte Dateien werden gelöscht, Fehler bleiben liegen."
