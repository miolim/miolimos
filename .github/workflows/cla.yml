# CLA Assistant — asks first-time pull-request authors to sign the
# Contributor License Agreement (CLA.md) before their PR can be merged.
#
# SETUP REQUIRED (one-time, by the maintainer):
#   1. Create a Personal Access Token (classic) with `repo` scope.
#   2. Add it as a repository secret named CLA_PERSONAL_ACCESS_TOKEN.
#   3. Signatures are stored in `signatures/cla.json` on the `main`
#      branch (auto-created on first signature).
# Until the secret exists this workflow is a no-op on PRs.
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/miolim/miolimos/blob/main/CLA.md"
          branch: "main"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          # Maintainer + bots are exempt from signing.
          allowlist: "Rabisnah,miolim,*[bot]"
