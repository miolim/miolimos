      cron_hint: "Empfohlen für automatischen Sync: per systemd-Path-Watcher oder Cron alle paar Minuten."
      match_hierarchy_title: "Match-Hierarchie"
      match_hierarchy_intro: 'Der Importer entscheidet "neu anlegen" vs. "anhängen" anhand dieser Reihenfolge:'
      match_rule_append_to_html: "<code>append_to: &lt;uuid&gt;</code> im Frontmatter (exakt)"
      match_rule_source_url_html: "<code>source_url:</code> matcht ein bestehendes Item (eindeutiger Chat-Link)"
      match_rule_chat_title_html: "<code>chat_title:</code> matcht (case-insens.) — der originale Chat-Titel, fix beim Anbieter"
      match_rule_title_html: "<code>title:</code> matcht (case-insens.) — Fallback, weniger zuverlässig (kann editiert worden sein)"
      match_rule_no_match: "kein Match → neue Notiz wird angelegt"
      chat_title_vs_title_html: "<strong><code>chat_title</code> vs. <code>title</code>:</strong> <code>chat_title</code> ist der externe Chat-Titel (aus Claude/ChatGPT/…) und dient als stabiler Match-Schlüssel zwischen Fortsetzungen. <code>title</code> ist der Titel innerhalb miolimOS — beim ersten Anlegen typisch identisch, kannst Du aber später frei umbenennen, ohne dass künftige Append-Calls fehlschlagen. Bei Kollisionen gewinnt die zuletzt aktualisierte Notiz. Frontmatter-Topics/Tags werden beim Append gemerged (Union), nie überschrieben."
      light_header_title: "Light-Header (alternative Eingabeform)"
      light_header_intro: "Wer kein YAML schreiben will, kann die ersten Zeilen einfach als Key-Value-Liste formulieren — der Importer erkennt das:"
      recognized_keys_html: "Erkannte Keys (case-insens., dt+en): <code>Chat-Titel/Chat-Title</code>, <code>Titel/Title</code>, <code>Datum/Date</code>, <code>Quelle/URL/Source</code>, <code>Themen/Topics</code>, <code>Tags</code>, <code>Append-To</code>. Datums-Formate: <code>YYYY-MM-DD</code> oder <code>DD.MM.YYYY</code>."
      http_api_title: "HTTP-API (Komfort-Pfad)"
      http_api_intro: "Statt File-Drop kann der Chat auch direkt per HTTP appenden — z.B. via Browser-Bookmarklet oder MCP-Tool. Endpoint:"
