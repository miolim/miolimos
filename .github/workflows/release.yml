name: Release

# #745: builds and publishes a production Docker image when a SemVer tag
# (vX.Y.Z) is pushed. Authenticates with the built-in GITHUB_TOKEN — no extra
# secrets needed. See docs/releasing.md. This is optional infrastructure: a
# release is valid (tag + GitHub release) even without published images.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker_image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        # Strip the leading "v" from the tag -> bare SemVer for the image tag.
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
